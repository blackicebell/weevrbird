<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weevrbird Policies</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #0e1715;
        --muted: #3b4d48;
        --green: #0f3d2e;
        --paper: #fffdf8;
        --mist: #eef8f3;
        --line: #d8e7de;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(145deg, var(--paper), var(--mist));
        color: var(--ink);
        font-family: Inter, Arial, sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(760px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      .eyebrow {
        color: var(--green);
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 12px 0 16px;
        font-family: Georgia, serif;
        font-size: clamp(44px, 8vw, 76px);
        letter-spacing: 0;
        line-height: 1.05;
      }

      p {
        color: var(--muted);
        font-size: 18px;
      }

      .links {
        display: grid;
        gap: 14px;
        margin-top: 32px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.76);
        color: var(--green);
        font-size: 20px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Weevrbird</div>
      <h1>Policies</h1>
      <p>
        These pages cover Weevrbird privacy, terms, support, and current
        early-build limitations for app store review and testers.
      </p>
      <div class="links">
        <a href="./privacy.html">Privacy Policy</a>
        <a href="./terms.html">Terms of Use</a>
      </div>
    </main>
  </body>
</html>
